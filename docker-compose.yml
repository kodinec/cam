services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"

  cam1-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/v4l:/dev/v4l
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -thread_queue_size
      - ${CAM1_THREAD_QUEUE:-1024}
      - -f
      - v4l2
      - -framerate
      - ${CAM1_FPS:-25}
      - -video_size
      - ${CAM1_RES:-1920x1080}
      - -i
      - ${CAM1_DEVICE:-/dev/video0}
      - -an
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -g
      - ${CAM1_GOP:-30}
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam1

  cam2-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    depends_on:
      - mediamtx
    devices:
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
      - /dev/v4l:/dev/v4l
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -thread_queue_size
      - ${CAM2_THREAD_QUEUE:-1024}
      - -f
      - v4l2
      - -input_format
      - ${CAM2_INPUT_FORMAT:-mjpeg}
      - -framerate
      - ${CAM2_FPS:-25}
      - -video_size
      - ${CAM2_RES:-1024x768}
      - -analyzeduration
      - ${CAM2_ANALYZE_DURATION:-100M}
      - -probesize
      - ${CAM2_PROBE_SIZE:-100M}
      - -i
      - ${CAM2_DEVICE:-/dev/video2}
      - -an
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -g
      - ${CAM2_GOP:-30}
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam2

  ptz-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mediamtx
      - cam1-publisher
      - cam2-publisher
    devices:
      - ${PTZ_SERIAL:-/dev/ttyACM0}:${PTZ_SERIAL:-/dev/ttyACM0}
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
      - /dev/v4l:/dev/v4l
    environment:
      LISTEN: ":8787"
      PTZ_USER: ${PTZ_USER:-admin}
      PTZ_PASS: ${PTZ_PASS:-admin}
      PTZ_SERIAL: ${PTZ_SERIAL:-/dev/ttyACM0}
      PTZ_BAUD: ${PTZ_BAUD:-115200}
      PTZ_ZOOM_MAX: ${PTZ_ZOOM_MAX:-25}
      PTZ_X_PER_STEP: ${PTZ_X_PER_STEP:-10.0}
      PTZ_Y_PER_STEP: ${PTZ_Y_PER_STEP:-10.0}
      PTZ_FEED: ${PTZ_FEED:-200}
      PTZ_ALLOW_RAW: ${PTZ_ALLOW_RAW:-false}
      CAM1_HLS_BASE: http://mediamtx:8888/cam1/
      CAM2_HLS_BASE: http://mediamtx:8888/cam2/
      CAM1_UPSTREAM: http://mediamtx:8888/cam1/index.m3u8
      CAM2_UPSTREAM: http://mediamtx:8888/cam2/index.m3u8
      CAM2_DEVICE: ${CAM2_DEVICE:-/dev/video2}
      CAM2_CONTROL_DEVICE: ${CAM2_CONTROL_DEVICE:-/dev/video2}
      CAM2_ZOOM_STEP: ${CAM2_ZOOM_STEP:-1}
    ports:
      - "8787:8787"
