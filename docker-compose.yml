services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_ADDITIONAL_HOSTS:-10.10.45.39}
      MTX_WEBRTCLOCALTCPADDRESS: :8189
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"

  cam1-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - /dev/v4l/by-id:/dev/v4l/by-id:ro
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -fflags
      - nobuffer
      - -flags
      - low_delay
      - -use_wallclock_as_timestamps
      - "1"
      - -thread_queue_size
      - ${CAM1_THREAD_QUEUE:-256}
      - -f
      - v4l2
      - -framerate
      - ${CAM1_FPS:-25}
      - -video_size
      - ${CAM1_RES:-1920x1080}
      - -i
      - ${CAM1_DEVICE:-/dev/video0}
      - -an
      - -c:v
      - libx264
      - -preset
      - ${CAM1_X264_PRESET:-veryfast}
      - -crf
      - ${CAM1_CRF:-18}
      - -tune
      - zerolatency
      - -bf
      - "0"
      - -pix_fmt
      - yuv420p
      - -g
      - ${CAM1_GOP:-25}
      - -keyint_min
      - ${CAM1_GOP:-25}
      - -sc_threshold
      - "0"
      - -flush_packets
      - "1"
      - -max_delay
      - "0"
      - -muxdelay
      - "0.0"
      - -muxpreload
      - "0.0"
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam1

  cam2-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - /dev/v4l/by-id:/dev/v4l/by-id:ro
    command:
      - -hide_banner
      - -loglevel
      - warning
      - -fflags
      - nobuffer
      - -flags
      - low_delay
      - -use_wallclock_as_timestamps
      - "1"
      - -thread_queue_size
      - ${CAM2_THREAD_QUEUE:-256}
      - -f
      - v4l2
      - -input_format
      - mjpeg
      - -framerate
      - "15"
      - -video_size
      - 1024x768
      - -analyzeduration
      - 5M
      - -probesize
      - 5M
      - -i
      - /dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0
      - -an
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -bf
      - "0"
      - -pix_fmt
      - yuv420p
      - -g
      - ${CAM2_GOP:-25}
      - -keyint_min
      - ${CAM2_GOP:-25}
      - -sc_threshold
      - "0"
      - -flush_packets
      - "1"
      - -max_delay
      - "0"
      - -muxdelay
      - "0.0"
      - -muxpreload
      - "0.0"
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/cam2

  ptz-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
      - cam1-publisher
      - cam2-publisher
    volumes:
      - /dev:/dev
      - /dev/v4l/by-id:/dev/v4l/by-id:ro
      - ./zoom8_focusmap.json:/app/zoom8_focusmap.json:ro
    environment:
      LISTEN: ":8787"
      PTZ_USER: ${PTZ_USER:-admin}
      PTZ_PASS: ${PTZ_PASS:-admin}
      PTZ_SERIAL: ${PTZ_SERIAL:-/dev/ttyACM0}
      PTZ_BAUD: ${PTZ_BAUD:-115200}
      PTZ_ZOOM_MAX: ${PTZ_ZOOM_MAX:-25}
      PTZ_X_PER_STEP: ${PTZ_X_PER_STEP:-10.0}
      PTZ_Y_PER_STEP: ${PTZ_Y_PER_STEP:-10.0}
      PTZ_FEED: ${PTZ_FEED:-200}
      PTZ_ALLOW_RAW: ${PTZ_ALLOW_RAW:-false}
      CAM1_MAP_PATH: /app/zoom8_focusmap.json
      CAM1_MAP_STEPS: "8"
      CAM1_MAP_FEED: "180"
      CAM1_RESET: ${CAM1_RESET:-true}
      CAM1_LIMIT_LED: ${CAM1_LIMIT_LED:-true}
      CAM1_IRIS_OPEN: ${CAM1_IRIS_OPEN:-true}
      CAM1_HOME_FOCUS: ${CAM1_HOME_FOCUS:-true}
      CAM1_HOME_TIMEOUT: ${CAM1_HOME_TIMEOUT:-25}
      CAM1_BACKOFF_X: ${CAM1_BACKOFF_X:-1.0}
      CAM1_BACKOFF_Y: ${CAM1_BACKOFF_Y:-0.5}
      CAM1_BACKOFF_FEED: ${CAM1_BACKOFF_FEED:-120}
      CAM1_START_X: ${CAM1_START_X:-0.0}
      CAM1_START_Y: ${CAM1_START_Y:-0.0}
      CAM1_GOTO_FEED: ${CAM1_GOTO_FEED:-200}
      CAM1_AUTO_RELEASE: ${CAM1_AUTO_RELEASE:-true}
      CAM1_RELEASE_STEP_X: ${CAM1_RELEASE_STEP_X:-0.2}
      CAM1_RELEASE_STEP_Y: ${CAM1_RELEASE_STEP_Y:-0.2}
      CAM1_RELEASE_MAX_STEPS: ${CAM1_RELEASE_MAX_STEPS:-40}
      CAM1_RELEASE_FEED: ${CAM1_RELEASE_FEED:-80}
      CAM1_RTC_BASE: http://mediamtx:8889/
      CAM2_RTC_BASE: http://mediamtx:8889/
      CAM2_DEVICE: /dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0
      CAM2_CONTROL_DEVICE: /dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0
      CAM2_ZOOM_STEP: "1"
    ports:
      - "8787:8787"
