services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_ADDITIONAL_HOSTS:-10.10.45.39}
      MTX_WEBRTCLOCALTCPADDRESS: :8189
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"

  cam1-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    environment:
      CAM1_DEVICE: ${CAM1_DEVICE:-/dev/v4l/by-id/usb-Kurokesu_C3_4K_00001-video-index0}
      CAM1_MODE: ${CAM1_MODE:-mjpeg}
      CAM1_FPS: ${CAM1_FPS:-25}
      CAM1_RES: ${CAM1_RES:-1920x1080}
      CAM1_THREAD_QUEUE: ${CAM1_THREAD_QUEUE:-64}
      CAM1_X264_PRESET: ${CAM1_X264_PRESET:-superfast}
      CAM1_CRF: ${CAM1_CRF:-14}
      CAM1_BITRATE: ${CAM1_BITRATE:-10M}
      CAM1_BUFSIZE: ${CAM1_BUFSIZE:-512k}
      CAM1_X264_PARAMS: ${CAM1_X264_PARAMS:-bframes=0:rc-lookahead=0:sync-lookahead=0:scenecut=0}
      CAM1_GOP: ${CAM1_GOP:-15}
      CAM1_RTSP_URL: rtsp://mediamtx:8554/cam1
    entrypoint: ["/bin/sh", "/scripts/cam1_publisher.sh"]

  cam2-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    environment:
      CAM2_DEVICE: ${CAM2_DEVICE:-/dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0}
      CAM2_MODE: ${CAM2_MODE:-mjpeg}
      CAM2_THREAD_QUEUE: ${CAM2_THREAD_QUEUE:-64}
      CAM2_H264_RES: ${CAM2_H264_RES:-1920x1080}
      CAM2_H264_FPS: ${CAM2_H264_FPS:-30}
      CAM2_MJPEG_RES: ${CAM2_MJPEG_RES:-1024x768}
      CAM2_MJPEG_FPS: ${CAM2_MJPEG_FPS:-15}
      CAM2_GOP: ${CAM2_GOP:-15}
      CAM2_ANALYZE_DURATION: ${CAM2_ANALYZE_DURATION:-5M}
      CAM2_PROBE_SIZE: ${CAM2_PROBE_SIZE:-5M}
      CAM2_MJPEG_CRF: ${CAM2_MJPEG_CRF:-24}
      CAM2_MJPEG_BITRATE: ${CAM2_MJPEG_BITRATE:-4M}
      CAM2_MJPEG_BUFSIZE: ${CAM2_MJPEG_BUFSIZE:-512k}
      CAM2_MJPEG_X264_PARAMS: ${CAM2_MJPEG_X264_PARAMS:-bframes=0:rc-lookahead=0:sync-lookahead=0:scenecut=0}
      CAM2_RTSP_URL: rtsp://mediamtx:8554/cam2
    entrypoint: ["/bin/sh", "/scripts/cam2_publisher.sh"]

  ptz-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
      - cam1-publisher
      - cam2-publisher
    volumes:
      - /dev:/dev
      - ${CAM1_MAP_FILE:-./zoom8_focusmap.json}:/app/zoom8_focusmap.json:ro
    environment:
      LISTEN: ":8787"
      PTZ_USER: ${PTZ_USER:-admin}
      PTZ_PASS: ${PTZ_PASS:-admin}
      PTZ_SERIAL: ${PTZ_SERIAL:-/dev/ttyACM0}
      PTZ_BAUD: ${PTZ_BAUD:-115200}
      PTZ_ZOOM_MAX: ${PTZ_ZOOM_MAX:-25}
      PTZ_X_PER_STEP: ${PTZ_X_PER_STEP:-10.0}
      PTZ_Y_PER_STEP: ${PTZ_Y_PER_STEP:-10.0}
      PTZ_FEED: ${PTZ_FEED:-200}
      PTZ_ALLOW_RAW: ${PTZ_ALLOW_RAW:-false}
      CAM1_MAP_PATH: /app/zoom8_focusmap.json
      CAM1_MAP_STEPS: "8"
      CAM1_MAP_FEED: "180"
      CAM1_RESET: ${CAM1_RESET:-true}
      CAM1_LIMIT_LED: ${CAM1_LIMIT_LED:-true}
      CAM1_IRIS_OPEN: ${CAM1_IRIS_OPEN:-true}
      CAM1_HOME_FOCUS: ${CAM1_HOME_FOCUS:-true}
      CAM1_HOME_TIMEOUT: ${CAM1_HOME_TIMEOUT:-25}
      CAM1_BACKOFF_X: ${CAM1_BACKOFF_X:-1.0}
      CAM1_BACKOFF_Y: ${CAM1_BACKOFF_Y:-0.5}
      CAM1_BACKOFF_FEED: ${CAM1_BACKOFF_FEED:-120}
      CAM1_START_X: ${CAM1_START_X:-0.0}
      CAM1_START_Y: ${CAM1_START_Y:-0.0}
      CAM1_GOTO_FEED: ${CAM1_GOTO_FEED:-200}
      CAM1_FOCUS_FINE_STEP: ${CAM1_FOCUS_FINE_STEP:-0.05}
      CAM1_AUTO_RELEASE: ${CAM1_AUTO_RELEASE:-true}
      CAM1_RELEASE_STEP_X: ${CAM1_RELEASE_STEP_X:-0.2}
      CAM1_RELEASE_STEP_Y: ${CAM1_RELEASE_STEP_Y:-0.2}
      CAM1_RELEASE_MAX_STEPS: ${CAM1_RELEASE_MAX_STEPS:-40}
      CAM1_RELEASE_FEED: ${CAM1_RELEASE_FEED:-80}
      CAM1_RTC_BASE: http://mediamtx:8889/
      CAM2_RTC_BASE: http://mediamtx:8889/
      CAM2_DEVICE: ${CAM2_DEVICE:-/dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0}
      CAM2_CONTROL_DEVICE: ${CAM2_CONTROL_DEVICE:-/dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0}
      CAM2_ZOOM_STEP: "1"
    ports:
      - "8787:8787"
