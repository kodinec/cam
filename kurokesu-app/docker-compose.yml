services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_ADDITIONAL_HOSTS:-10.10.45.39}
      MTX_WEBRTCLOCALTCPADDRESS: :8189
    ports:
      - "${MTX_RTSP_PORT}:8554"
      - "${MTX_WEBRTC_ICE_PORT}:8189/udp"
      - "${MTX_WEBRTC_ICE_PORT}:8189/tcp"

  cam1-publisher:
    build:
      context: ./cam1-publisher
      dockerfile: Dockerfile
    image: kurokesu-app-cam1-publisher
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/scripts/cam1_publisher.sh"]

  cam2-publisher:
    build:
      context: ./cam1-publisher
      dockerfile: Dockerfile
    image: kurokesu-app-cam2-publisher
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/scripts/cam2_publisher.sh"]

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
      - cam1-publisher
      - cam2-publisher
    volumes:
      - /dev:/dev
      - ./focusmap.json:/app/focusmap.json:ro
    env_file:
      - .env
    ports:
      - "${WEB_PORT}:8787"
