services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: ${WEBRTC_ADDITIONAL_HOSTS:-10.10.45.39}
      MTX_WEBRTCLOCALTCPADDRESS: :8189
    ports:
      - "${MTX_RTSP_PORT:-8554}:8554"
      - "${MTX_WEBRTC_HTTP_PORT:-8889}:8889"
      - "${MTX_WEBRTC_ICE_PORT:-8189}:8189/udp"
      - "${MTX_WEBRTC_ICE_PORT:-8189}:8189/tcp"

  ptz-init:
    build:
      context: ./ptz-init
      dockerfile: Dockerfile
    restart: "no"
    privileged: true
    volumes:
      - /dev:/dev
    environment:
      PTZ_SERIAL: ${PTZ_SERIAL:-/dev/ttyACM0}
      PTZ_SERIAL_FALLBACK: ${PTZ_SERIAL_FALLBACK:-/dev/serial/by-id/usb-tomeko_net_STM32F103C8T6_6D8648755083-if00}
      PTZ_BAUD: ${PTZ_BAUD:-115200}
      PTZ_RESET: ${PTZ_RESET:-true}
      PTZ_LIMIT_LED: ${PTZ_LIMIT_LED:-true}
      PTZ_IRIS_OPEN: ${PTZ_IRIS_OPEN:-true}
      PTZ_HOME_TIMEOUT: ${PTZ_HOME_TIMEOUT:-25}
      PTZ_BACKOFF_X: ${PTZ_BACKOFF_X:-1.0}
      PTZ_BACKOFF_Y: ${PTZ_BACKOFF_Y:-0.5}
      PTZ_BACKOFF_FEED: ${PTZ_BACKOFF_FEED:-120}
      PTZ_GOTO_FEED: ${PTZ_GOTO_FEED:-200}
      PTZ_START_X: ${PTZ_START_X:-0.0}
      PTZ_START_Y: ${PTZ_START_Y:-0.0}
      PTZ_RELEASE_STEP_X: ${PTZ_RELEASE_STEP_X:-0.2}
      PTZ_RELEASE_STEP_Y: ${PTZ_RELEASE_STEP_Y:-0.2}
      PTZ_RELEASE_MAX_STEPS: ${PTZ_RELEASE_MAX_STEPS:-40}
      PTZ_RELEASE_FEED: ${PTZ_RELEASE_FEED:-80}
      PTZ_INIT_MAX_TRIES: ${PTZ_INIT_MAX_TRIES:-40}
      PTZ_INIT_RETRY_SEC: ${PTZ_INIT_RETRY_SEC:-1.5}

  cam1-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      mediamtx:
        condition: service_started
      ptz-init:
        condition: service_completed_successfully
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    environment:
      CAM1_DEVICE: ${CAM1_DEVICE:-/dev/v4l/by-id/usb-Kurokesu_C3_4K_00001-video-index0}
      CAM1_DEVICE_FALLBACK: ${CAM1_DEVICE_FALLBACK:-/dev/video0}
      CAM1_RES: ${CAM1_RES:-1920x1080}
      CAM1_FPS: ${CAM1_FPS:-25}
      CAM1_GOP: ${CAM1_GOP:-15}
      CAM1_THREAD_QUEUE: ${CAM1_THREAD_QUEUE:-64}
      CAM1_X264_PRESET: ${CAM1_X264_PRESET:-superfast}
      CAM1_CRF: ${CAM1_CRF:-14}
      CAM1_BITRATE: ${CAM1_BITRATE:-10M}
      CAM1_BUFSIZE: ${CAM1_BUFSIZE:-512k}
      CAM1_RTSP_URL: rtsp://mediamtx:8554/cam1
    entrypoint: ["/bin/sh", "/scripts/cam1_publisher.sh"]

  cam2-publisher:
    image: jrottenberg/ffmpeg:6.1-ubuntu
    restart: unless-stopped
    privileged: true
    depends_on:
      - mediamtx
    volumes:
      - /dev:/dev
      - ./scripts:/scripts:ro
    environment:
      CAM2_DEVICE: ${CAM2_DEVICE:-/dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0}
      CAM2_DEVICE_FALLBACK: ${CAM2_DEVICE_FALLBACK:-/dev/video2}
      CAM2_RES: ${CAM2_RES:-1024x768}
      CAM2_FPS: ${CAM2_FPS:-15}
      CAM2_GOP: ${CAM2_GOP:-15}
      CAM2_THREAD_QUEUE: ${CAM2_THREAD_QUEUE:-64}
      CAM2_X264_PRESET: ${CAM2_X264_PRESET:-ultrafast}
      CAM2_CRF: ${CAM2_CRF:-24}
      CAM2_BITRATE: ${CAM2_BITRATE:-4M}
      CAM2_BUFSIZE: ${CAM2_BUFSIZE:-512k}
      CAM2_ANALYZE_DURATION: ${CAM2_ANALYZE_DURATION:-5M}
      CAM2_PROBE_SIZE: ${CAM2_PROBE_SIZE:-5M}
      CAM2_RTSP_URL: rtsp://mediamtx:8554/cam2
    entrypoint: ["/bin/sh", "/scripts/cam2_publisher.sh"]

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mediamtx
      - cam1-publisher
      - cam2-publisher
    environment:
      WEB_LISTEN: :8787
      CAM1_DEVICE: ${CAM1_DEVICE:-/dev/v4l/by-id/usb-Kurokesu_C3_4K_00001-video-index0}
      CAM2_DEVICE: ${CAM2_DEVICE:-/dev/v4l/by-id/usb-rockchip_UVC_2020-video-index0}
      WEBRTC_PORT: ${MTX_WEBRTC_HTTP_PORT:-8889}
    volumes:
      - /dev:/dev:ro
    ports:
      - "${WEB_PORT:-8787}:8787"
